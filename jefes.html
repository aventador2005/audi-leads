<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audi — Panel de Dirección</title>
<style>
  :root {
    --audi-black: #000000;
    --audi-white: #ffffff;
    --audi-silver: #d0d0d0;
    --audi-gray-dark: #1a1a1a;
    --audi-gray-mid: #2c2c2c;
    --audi-gray-light: #3d3d3d;
    --audi-gray-muted: #888888;
    --audi-red: #bb0a14;
    --audi-red-dark: #8a0710;
    --font: 'Arial', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--audi-black);
    color: var(--audi-white);
    font-family: var(--font);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--audi-gray-dark);
    border-bottom: 1px solid var(--audi-gray-light);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .audi-rings {
    display: flex;
    gap: -6px;
  }

  .audi-rings span {
    display: inline-block;
    width: 22px;
    height: 22px;
    border: 2.5px solid var(--audi-silver);
    border-radius: 50%;
    margin-left: -8px;
  }

  .audi-rings span:first-child { margin-left: 0; }

  .logo-text {
    font-size: 13px;
    letter-spacing: 4px;
    font-weight: 700;
    color: var(--audi-white);
    text-transform: uppercase;
  }

  .header-title {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--audi-gray-muted);
    text-transform: uppercase;
  }

  .header-badge {
    background: var(--audi-red);
    color: white;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 4px 10px;
    text-transform: uppercase;
  }

  /* STATS BAR */
  .stats-bar {
    background: var(--audi-gray-dark);
    border-bottom: 1px solid var(--audi-gray-light);
    padding: 1rem 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 1rem;
  }

  .stat-card {
    text-align: center;
    padding: 0.75rem 1rem;
    border-left: 2px solid var(--audi-gray-light);
  }

  .stat-card:first-child { border-left: none; }

  .stat-number {
    font-size: 28px;
    font-weight: 700;
    color: var(--audi-white);
    line-height: 1;
  }

  .stat-number.red { color: var(--audi-red); }

  .stat-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--audi-gray-muted);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* CONTROLS */
  .controls {
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--audi-gray-light);
    background: var(--audi-gray-dark);
  }

  .controls-left {
    display: flex;
    gap: 0.5rem;
    flex: 1;
    flex-wrap: wrap;
  }

  select, input {
    background: var(--audi-gray-mid);
    border: 1px solid var(--audi-gray-light);
    color: var(--audi-white);
    padding: 8px 12px;
    font-size: 12px;
    letter-spacing: 1px;
    outline: none;
    cursor: pointer;
    min-width: 150px;
  }

  select:focus, input:focus {
    border-color: var(--audi-silver);
  }

  input::placeholder { color: var(--audi-gray-muted); }

  .btn {
    background: var(--audi-red);
    color: white;
    border: none;
    padding: 8px 20px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--audi-red-dark); }

  .btn.secondary {
    background: transparent;
    border: 1px solid var(--audi-gray-light);
    color: var(--audi-silver);
  }

  .btn.secondary:hover { border-color: var(--audi-silver); background: var(--audi-gray-light); }

  /* TABLE */
  .table-wrapper {
    padding: 1.5rem 2rem;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead tr {
    border-bottom: 2px solid var(--audi-gray-light);
  }

  th {
    text-align: left;
    padding: 10px 16px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--audi-gray-muted);
    text-transform: uppercase;
    font-weight: 400;
    cursor: pointer;
    white-space: nowrap;
  }

  th:hover { color: var(--audi-silver); }

  th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  th.sorted .sort-arrow { opacity: 1; color: var(--audi-red); }

  tbody tr {
    border-bottom: 1px solid #1e1e1e;
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--audi-gray-dark); }

  td {
    padding: 14px 16px;
    color: var(--audi-white);
  }

  .lead-name {
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* STATUS BADGES */
  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .status-pendiente   { background: #2a2200; color: #f5c518; border: 1px solid #f5c518; }
  .status-no-contesta { background: #1a1a2e; color: #7b7bff; border: 1px solid #7b7bff; }
  .status-negociacion { background: #001a2e; color: #4fc3f7; border: 1px solid #4fc3f7; }
  .status-vendido     { background: #002200; color: #4caf50; border: 1px solid #4caf50; }
  .status-descartado  { background: #1e0a0a; color: #ef5350; border: 1px solid #ef5350; }

  .status-select {
    background: transparent;
    border: none;
    color: inherit;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    padding: 0;
    outline: none;
    width: 100%;
  }

  .vendedor-cell {
    color: var(--audi-silver);
    font-size: 12px;
  }

  .date-cell {
    color: var(--audi-gray-muted);
    font-size: 12px;
    white-space: nowrap;
  }

  .actions-cell {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .action-btn {
    background: none;
    border: 1px solid var(--audi-gray-light);
    color: var(--audi-gray-muted);
    padding: 4px 10px;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .action-btn:hover { color: var(--audi-white); border-color: var(--audi-silver); }
  .action-btn.delete:hover { color: var(--audi-red); border-color: var(--audi-red); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--audi-gray-dark);
    border: 1px solid var(--audi-gray-light);
    padding: 2rem;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--audi-gray-light);
  }

  .modal-title {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--audi-silver);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--audi-gray-muted);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
  }

  .modal-close:hover { color: var(--audi-white); }

  .form-group {
    margin-bottom: 1.25rem;
  }

  .form-label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--audi-gray-muted);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: var(--audi-gray-mid);
    border: 1px solid var(--audi-gray-light);
    color: var(--audi-white);
    padding: 10px 12px;
    font-size: 13px;
    outline: none;
  }

  .form-input:focus { border-color: var(--audi-red); }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .modal-footer {
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--audi-gray-light);
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--audi-gray-muted);
  }

  .empty-state p {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* LIVE INDICATOR */
  .live-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    background: #4caf50;
    border-radius: 50%;
    animation: pulse 2s infinite;
    margin-right: 6px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .live-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--audi-gray-muted);
    text-transform: uppercase;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--audi-gray-mid);
    border-left: 3px solid var(--audi-red);
    color: var(--audi-white);
    padding: 12px 20px;
    font-size: 12px;
    letter-spacing: 1px;
    z-index: 9999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  /* VENDEDOR SUMMARY */
  .vendedor-summary {
    padding: 1rem 2rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--audi-gray-light);
  }

  .vendedor-tag {
    background: var(--audi-gray-mid);
    border: 1px solid var(--audi-gray-light);
    padding: 4px 12px;
    font-size: 11px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .vendedor-tag .count {
    background: var(--audi-red);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--audi-gray-muted);
    text-transform: uppercase;
    padding: 0.75rem 2rem 0.5rem;
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="audi-rings">
      <span></span><span></span><span></span><span></span>
    </div>
    <span class="logo-text">Audi</span>
    <span style="color: var(--audi-gray-light); margin: 0 8px;">|</span>
    <span class="header-title">Panel de Dirección</span>
  </div>
  <div style="display: flex; align-items: center; gap: 16px;">
    <span><span class="live-dot"></span><span class="live-label">En vivo</span></span>
    <span class="header-badge">Jefes</span>
  </div>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat-card">
    <div class="stat-number" id="statTotal">—</div>
    <div class="stat-label">Total leads</div>
  </div>
  <div class="stat-card">
    <div class="stat-number" style="color:#f5c518" id="statPendiente">—</div>
    <div class="stat-label">Pendientes</div>
  </div>
  <div class="stat-card">
    <div class="stat-number" style="color:#4fc3f7" id="statNegociacion">—</div>
    <div class="stat-label">En negociación</div>
  </div>
  <div class="stat-card">
    <div class="stat-number" style="color:#4caf50" id="statVendido">—</div>
    <div class="stat-label">Vendidos</div>
  </div>
  <div class="stat-card">
    <div class="stat-number" style="color:#ef5350" id="statDescartado">—</div>
    <div class="stat-label">Descartados</div>
  </div>
</div>

<div class="controls">
  <div class="controls-left">
    <input type="text" id="searchInput" placeholder="Buscar lead o vendedor…" style="min-width:200px;" oninput="filterLeads()">
    <select id="filterEstado" onchange="filterLeads()">
      <option value="">Todos los estados</option>
      <option value="Pendiente">Pendiente</option>
      <option value="No contesta">No contesta</option>
      <option value="Negociación">Negociación</option>
      <option value="Vendido">Vendido</option>
      <option value="Descartado">Descartado</option>
    </select>
    <select id="filterVendedor" onchange="filterLeads()">
      <option value="">Todos los vendedores</option>
    </select>
  </div>
  <button class="btn" onclick="openModal()">+ Nuevo lead</button>
</div>

<div class="section-label">Leads por vendedor</div>
<div class="vendedor-summary" id="vendedorSummary"></div>

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th onclick="sortTable('nombre')">Lead <span class="sort-arrow">↕</span></th>
        <th onclick="sortTable('estado')">Estado <span class="sort-arrow">↕</span></th>
        <th onclick="sortTable('fechaAsignacion')">Fecha asignación <span class="sort-arrow">↕</span></th>
        <th onclick="sortTable('vendedor')">Vendedor <span class="sort-arrow">↕</span></th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="leadsTableBody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none;">
    <p>No hay leads registrados</p>
    <p style="margin-top:8px; font-size:11px; letter-spacing:1px; color:#555;">Añade el primer lead con el botón superior</p>
  </div>
</div>

<!-- MODAL NUEVO / EDITAR LEAD -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Nuevo lead</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-input" id="inputNombre" placeholder="Nombre">
      </div>
      <div class="form-group">
        <label class="form-label">Apellidos</label>
        <input type="text" class="form-input" id="inputApellidos" placeholder="Apellidos">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Estado</label>
      <select class="form-input" id="inputEstado">
        <option value="Pendiente">Pendiente</option>
        <option value="No contesta">No contesta</option>
        <option value="Negociación">Negociación</option>
        <option value="Vendido">Vendido</option>
        <option value="Descartado">Descartado</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Fecha de asignación</label>
      <input type="date" class="form-input" id="inputFecha">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nombre vendedor</label>
        <input type="text" class="form-input" id="inputVendedorNombre" placeholder="Nombre">
      </div>
      <div class="form-group">
        <label class="form-label">Apellido vendedor</label>
        <input type="text" class="form-input" id="inputVendedorApellido" placeholder="Apellidos">
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn" onclick="saveLead()">Guardar lead</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ==========================================
// CONFIGURACIÓN FIREBASE — REEMPLAZA AQUÍ
// ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyDnPbDkfQE2NfifFqRb7TJXvcY6zCNy1Hk",
  authDomain: "gestionleadsaudi.firebaseapp.com",
  projectId: "gestionleadsaudi",
  storageBucket: "gestionleadsaudi.firebasestorage.app",
  messagingSenderId: "805968706133",
  appId: "1:805968706133:web:88ea847b5dd9119ce7b2dc",
  measurementId: "G-HVJTQNNP0F"
};
// ==========================================

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allLeads = [];
let editingId = null;
let sortField = 'fechaAsignacion';
let sortAsc = false;

// Escuchar cambios en tiempo real
const leadsRef = collection(db, "leads");
const q = query(leadsRef, orderBy("fechaAsignacion", "desc"));

onSnapshot(q, (snapshot) => {
  allLeads = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  renderAll();
});

function renderAll() {
  updateStats();
  updateVendedorFilter();
  updateVendedorSummary();
  filterLeads();
}

function updateStats() {
  document.getElementById('statTotal').textContent = allLeads.length;
  document.getElementById('statPendiente').textContent = allLeads.filter(l => l.estado === 'Pendiente').length;
  document.getElementById('statNegociacion').textContent = allLeads.filter(l => l.estado === 'Negociación').length;
  document.getElementById('statVendido').textContent = allLeads.filter(l => l.estado === 'Vendido').length;
  document.getElementById('statDescartado').textContent = allLeads.filter(l => l.estado === 'Descartado').length;
}

function updateVendedorFilter() {
  const sel = document.getElementById('filterVendedor');
  const current = sel.value;
  const vendedores = [...new Set(allLeads.map(l => l.vendedor).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Todos los vendedores</option>';
  vendedores.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    if (v === current) opt.selected = true;
    sel.appendChild(opt);
  });
}

function updateVendedorSummary() {
  const container = document.getElementById('vendedorSummary');
  const counts = {};
  allLeads.forEach(l => {
    if (l.vendedor) counts[l.vendedor] = (counts[l.vendedor] || 0) + 1;
  });
  container.innerHTML = Object.entries(counts).sort((a,b) => b[1]-a[1]).map(([v, c]) =>
    `<div class="vendedor-tag">${v}<span class="count">${c}</span></div>`
  ).join('');
}

window.filterLeads = function() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const estado = document.getElementById('filterEstado').value;
  const vendedor = document.getElementById('filterVendedor').value;

  let filtered = allLeads.filter(l => {
    const matchSearch = !search || l.nombre?.toLowerCase().includes(search) || l.vendedor?.toLowerCase().includes(search);
    const matchEstado = !estado || l.estado === estado;
    const matchVendedor = !vendedor || l.vendedor === vendedor;
    return matchSearch && matchEstado && matchVendedor;
  });

  filtered.sort((a, b) => {
    const va = a[sortField] || '';
    const vb = b[sortField] || '';
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  renderTable(filtered);
};

function getStatusClass(estado) {
  const map = { 'Pendiente': 'pendiente', 'No contesta': 'no-contesta', 'Negociación': 'negociacion', 'Vendido': 'vendido', 'Descartado': 'descartado' };
  return map[estado] || 'pendiente';
}

function renderTable(leads) {
  const tbody = document.getElementById('leadsTableBody');
  const empty = document.getElementById('emptyState');

  if (leads.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = leads.map(lead => `
    <tr>
      <td><span class="lead-name">${escHtml(lead.nombre || '—')}</span></td>
      <td>
        <span class="status-badge status-${getStatusClass(lead.estado)}">
          <select class="status-select" onchange="changeStatus('${lead.id}', this.value)">
            ${['Pendiente','No contesta','Negociación','Vendido','Descartado'].map(s =>
              `<option value="${s}" ${lead.estado === s ? 'selected' : ''}>${s}</option>`
            ).join('')}
          </select>
        </span>
      </td>
      <td class="date-cell">${lead.fechaAsignacion ? formatDate(lead.fechaAsignacion) : '—'}</td>
      <td class="vendedor-cell">${escHtml(lead.vendedor || '—')}</td>
      <td>
        <div class="actions-cell">
          <button class="action-btn" onclick='editLead(${JSON.stringify(lead)})'>Editar</button>
          <button class="action-btn delete" onclick="deleteLead('${lead.id}')">Eliminar</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function formatDate(d) {
  if (!d) return '—';
  const parts = d.split('-');
  if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
  return d;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.changeStatus = async function(id, newEstado) {
  try {
    await updateDoc(doc(db, "leads", id), { estado: newEstado });
    showToast(`Estado actualizado: ${newEstado}`);
  } catch(e) { showToast('Error al actualizar'); }
};

window.openModal = function() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Nuevo lead';
  document.getElementById('inputNombre').value = '';
  document.getElementById('inputApellidos').value = '';
  document.getElementById('inputEstado').value = 'Pendiente';
  document.getElementById('inputFecha').value = new Date().toISOString().split('T')[0];
  document.getElementById('inputVendedorNombre').value = '';
  document.getElementById('inputVendedorApellido').value = '';
  document.getElementById('modalOverlay').classList.add('open');
};

window.editLead = function(lead) {
  editingId = lead.id;
  document.getElementById('modalTitle').textContent = 'Editar lead';
  const nameParts = (lead.nombre || '').split(' ');
  const apellidos = nameParts.slice(1).join(' ');
  document.getElementById('inputNombre').value = nameParts[0] || '';
  document.getElementById('inputApellidos').value = apellidos || '';
  document.getElementById('inputEstado').value = lead.estado || 'Pendiente';
  document.getElementById('inputFecha').value = lead.fechaAsignacion || '';
  const vParts = (lead.vendedor || '').split(' ');
  document.getElementById('inputVendedorNombre').value = vParts[0] || '';
  document.getElementById('inputVendedorApellido').value = vParts.slice(1).join(' ') || '';
  document.getElementById('modalOverlay').classList.add('open');
};

window.closeModal = function() {
  document.getElementById('modalOverlay').classList.remove('open');
};

window.closeModalOnOverlay = function(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
};

window.saveLead = async function() {
  const nombre = document.getElementById('inputNombre').value.trim();
  const apellidos = document.getElementById('inputApellidos').value.trim();
  const estado = document.getElementById('inputEstado').value;
  const fechaAsignacion = document.getElementById('inputFecha').value;
  const vNombre = document.getElementById('inputVendedorNombre').value.trim();
  const vApellido = document.getElementById('inputVendedorApellido').value.trim();

  if (!nombre || !vNombre) { showToast('Nombre del lead y vendedor son obligatorios'); return; }

  const data = {
    nombre: apellidos ? `${nombre} ${apellidos}` : nombre,
    estado,
    fechaAsignacion,
    vendedor: vApellido ? `${vNombre} ${vApellido}` : vNombre,
    updatedAt: serverTimestamp()
  };

  try {
    if (editingId) {
      await updateDoc(doc(db, "leads", editingId), data);
      showToast('Lead actualizado');
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(collection(db, "leads"), data);
      showToast('Lead añadido');
    }
    closeModal();
  } catch(e) { showToast('Error al guardar: ' + e.message); }
};

window.deleteLead = async function(id) {
  if (!confirm('¿Eliminar este lead?')) return;
  try {
    await deleteDoc(doc(db, "leads", id));
    showToast('Lead eliminado');
  } catch(e) { showToast('Error al eliminar'); }
};

window.sortTable = function(field) {
  if (sortField === field) sortAsc = !sortAsc;
  else { sortField = field; sortAsc = true; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  document.querySelectorAll('th').forEach(th => {
    if (th.onclick?.toString().includes(field)) th.classList.add('sorted');
  });
  filterLeads();
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
