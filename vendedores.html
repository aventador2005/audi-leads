<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audi — Mis Leads</title>
<style>
  :root {
    --audi-black: #000000;
    --audi-white: #ffffff;
    --audi-silver: #d0d0d0;
    --audi-gray-dark: #1a1a1a;
    --audi-gray-mid: #2c2c2c;
    --audi-gray-light: #3d3d3d;
    --audi-gray-muted: #888888;
    --audi-red: #bb0a14;
    --font: 'Arial', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--audi-black);
    color: var(--audi-white);
    font-family: var(--font);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--audi-gray-dark);
    border-bottom: 1px solid var(--audi-gray-light);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .audi-rings span {
    display: inline-block;
    width: 22px;
    height: 22px;
    border: 2.5px solid var(--audi-silver);
    border-radius: 50%;
    margin-left: -8px;
  }

  .audi-rings span:first-child { margin-left: 0; }

  .logo-text {
    font-size: 13px;
    letter-spacing: 4px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .header-title {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--audi-gray-muted);
    text-transform: uppercase;
  }

  /* LOGIN SCREEN */
  .login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 64px);
    padding: 2rem;
  }

  .login-box {
    background: var(--audi-gray-dark);
    border: 1px solid var(--audi-gray-light);
    padding: 2.5rem;
    width: 380px;
    max-width: 100%;
  }

  .login-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--audi-gray-muted);
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--audi-gray-light);
  }

  .login-subtitle {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 1.5rem;
    letter-spacing: 1px;
  }

  .form-group { margin-bottom: 1.25rem; }

  .form-label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--audi-gray-muted);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: var(--audi-gray-mid);
    border: 1px solid var(--audi-gray-light);
    color: var(--audi-white);
    padding: 10px 12px;
    font-size: 13px;
    outline: none;
    font-family: var(--font);
  }

  .form-input:focus { border-color: var(--audi-red); }

  .btn {
    background: var(--audi-red);
    color: white;
    border: none;
    padding: 10px 24px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
    font-family: var(--font);
  }

  .btn:hover { background: #8a0710; }

  .btn.secondary {
    background: transparent;
    border: 1px solid var(--audi-gray-light);
    color: var(--audi-silver);
    margin-top: 0.5rem;
  }

  /* MAIN APP */
  .app-screen { display: none; }
  .app-screen.visible { display: block; }

  /* WELCOME BAR */
  .welcome-bar {
    background: var(--audi-gray-dark);
    border-bottom: 1px solid var(--audi-gray-light);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .welcome-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .welcome-sub {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--audi-gray-muted);
    margin-top: 2px;
    text-transform: uppercase;
  }

  .logout-btn {
    background: none;
    border: 1px solid var(--audi-gray-light);
    color: var(--audi-gray-muted);
    padding: 6px 14px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: var(--font);
  }

  .logout-btn:hover { color: var(--audi-white); border-color: var(--audi-silver); }

  /* MY STATS */
  .my-stats {
    padding: 1.5rem 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 1rem;
    border-bottom: 1px solid var(--audi-gray-light);
  }

  .stat-card {
    background: var(--audi-gray-dark);
    border: 1px solid var(--audi-gray-light);
    padding: 1rem 1.25rem;
    text-align: center;
  }

  .stat-number {
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--audi-gray-muted);
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* CONTROLS */
  .controls {
    padding: 1rem 2rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--audi-gray-light);
    background: var(--audi-gray-dark);
  }

  select, input {
    background: var(--audi-gray-mid);
    border: 1px solid var(--audi-gray-light);
    color: var(--audi-white);
    padding: 8px 12px;
    font-size: 12px;
    letter-spacing: 1px;
    outline: none;
    cursor: pointer;
    font-family: var(--font);
  }

  select:focus, input:focus { border-color: var(--audi-silver); }
  input::placeholder { color: var(--audi-gray-muted); }

  /* TABLE */
  .table-wrapper {
    padding: 1.5rem 2rem;
    overflow-x: auto;
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  thead tr { border-bottom: 2px solid var(--audi-gray-light); }

  th {
    text-align: left;
    padding: 10px 16px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--audi-gray-muted);
    text-transform: uppercase;
    font-weight: 400;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid #1e1e1e;
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--audi-gray-dark); }

  td { padding: 14px 16px; }

  .lead-name { font-weight: 600; letter-spacing: 0.5px; }

  .status-badge {
    display: inline-block;
    padding: 4px 12px;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
    white-space: nowrap;
  }

  .status-pendiente   { background: #2a2200; color: #f5c518; border: 1px solid #f5c518; }
  .status-no-contesta { background: #1a1a2e; color: #7b7bff; border: 1px solid #7b7bff; }
  .status-negociacion { background: #001a2e; color: #4fc3f7; border: 1px solid #4fc3f7; }
  .status-vendido     { background: #002200; color: #4caf50; border: 1px solid #4caf50; }
  .status-descartado  { background: #1e0a0a; color: #ef5350; border: 1px solid #ef5350; }

  .status-select {
    background: transparent;
    border: none;
    color: inherit;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    padding: 0;
    outline: none;
    width: 100%;
    font-family: var(--font);
  }

  .date-cell { color: var(--audi-gray-muted); font-size: 12px; white-space: nowrap; }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--audi-gray-muted);
  }

  .empty-state p { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }

  .live-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    background: #4caf50;
    border-radius: 50%;
    animation: pulse 2s infinite;
    margin-right: 6px;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .live-label { font-size: 10px; letter-spacing: 2px; color: var(--audi-gray-muted); text-transform: uppercase; }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--audi-gray-mid);
    border-left: 3px solid var(--audi-red);
    color: var(--audi-white);
    padding: 12px 20px;
    font-size: 12px;
    letter-spacing: 1px;
    z-index: 9999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  .error-msg {
    color: var(--audi-red);
    font-size: 11px;
    letter-spacing: 1px;
    margin-top: 8px;
    display: none;
  }

  .progress-bar-wrap {
    background: var(--audi-gray-light);
    height: 4px;
    margin-top: 6px;
  }

  .progress-bar {
    height: 4px;
    background: var(--audi-red);
    transition: width 0.5s;
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="audi-rings">
      <span></span><span></span><span></span><span></span>
    </div>
    <span class="logo-text" style="margin-left:8px">Audi</span>
    <span style="color: #3d3d3d; margin: 0 8px;">|</span>
    <span class="header-title">Mis Leads</span>
  </div>
  <div>
    <span><span class="live-dot"></span><span class="live-label">En vivo</span></span>
  </div>
</header>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-title">Acceso vendedor</div>
    <div class="login-subtitle">Introduce tu nombre</div>
    <div class="form-group">
      <label class="form-label">Tu nombre completo</label>
      <input type="text" class="form-input" id="loginNombre" placeholder="Nombre Apellido" oninput="document.getElementById('loginError').style.display='none'">
      <div class="error-msg" id="loginError">No se encontró ningún lead asignado a este nombre.</div>
    </div>
    <button class="btn" onclick="doLogin()">Acceder a mis leads</button>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div class="app-screen" id="appScreen">

  <div class="welcome-bar">
    <div>
      <div class="welcome-name" id="welcomeName">—</div>
      <div class="welcome-sub">Vendedor · Vista personal</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Cerrar sesión</button>
  </div>

  <div class="my-stats" id="myStats">
    <div class="stat-card">
      <div class="stat-number" id="myTotal">—</div>
      <div class="stat-label">Mis leads</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" style="color:#f5c518" id="myPendiente">—</div>
      <div class="stat-label">Pendientes</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" style="color:#4fc3f7" id="myNegociacion">—</div>
      <div class="stat-label">Negociación</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" style="color:#4caf50" id="myVendido">—</div>
      <div class="stat-label">Vendidos</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" style="color:#ef5350" id="myDescartado">—</div>
      <div class="stat-label">Descartados</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" style="color:#4caf50" id="myConversion">—%</div>
      <div class="stat-label">Conversión</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="myConversionBar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <input type="text" id="mySearch" placeholder="Buscar lead…" oninput="filterMyLeads()" style="min-width:180px">
    <select id="myFilterEstado" onchange="filterMyLeads()">
      <option value="">Todos los estados</option>
      <option value="Pendiente">Pendiente</option>
      <option value="No contesta">No contesta</option>
      <option value="Negociación">Negociación</option>
      <option value="Vendido">Vendido</option>
      <option value="Descartado">Descartado</option>
    </select>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Lead</th>
          <th>Estado</th>
          <th>Fecha asignación</th>
          <th>Asignado a</th>
        </tr>
      </thead>
      <tbody id="myTableBody"></tbody>
    </table>
    <div class="empty-state" id="myEmpty" style="display:none;">
      <p>No tienes leads asignados</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ==========================================
// CONFIGURACIÓN FIREBASE — REEMPLAZA AQUÍ
// ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyDnPbDkfQE2NfifFqRb7TJXvcY6zCNy1Hk",
  authDomain: "gestionleadsaudi.firebaseapp.com",
  projectId: "gestionleadsaudi",
  storageBucket: "gestionleadsaudi.firebasestorage.app",
  messagingSenderId: "805968706133",
  appId: "1:805968706133:web:88ea847b5dd9119ce7b2dc",
  measurementId: "G-HVJTQNNP0F"
};
// ==========================================

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allLeads = [];
let currentVendedor = localStorage.getItem('audi_vendedor') || null;

// Escuchar todos los leads en tiempo real
const q = query(collection(db, "leads"), orderBy("fechaAsignacion", "desc"));
onSnapshot(q, (snapshot) => {
  allLeads = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  if (currentVendedor) {
    showApp();
    filterMyLeads();
  }
});

// Si ya estaba logueado
if (currentVendedor) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').classList.add('visible');
  document.getElementById('welcomeName').textContent = currentVendedor;
}

window.doLogin = function() {
  const nombre = document.getElementById('loginNombre').value.trim();
  if (!nombre) return;

  // Buscar coincidencia aproximada
  const match = allLeads.find(l =>
    l.vendedor?.toLowerCase().trim() === nombre.toLowerCase().trim()
  );

  if (!match) {
    document.getElementById('loginError').style.display = 'block';
    return;
  }

  currentVendedor = match.vendedor;
  localStorage.setItem('audi_vendedor', currentVendedor);
  showApp();
};

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').classList.add('visible');
  document.getElementById('welcomeName').textContent = currentVendedor;
  updateMyStats();
  filterMyLeads();
}

window.doLogout = function() {
  currentVendedor = null;
  localStorage.removeItem('audi_vendedor');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').classList.remove('visible');
  document.getElementById('loginNombre').value = '';
};

function getMyLeads() {
  return allLeads.filter(l => l.vendedor?.toLowerCase().trim() === currentVendedor?.toLowerCase().trim());
}

function updateMyStats() {
  const my = getMyLeads();
  document.getElementById('myTotal').textContent = my.length;
  document.getElementById('myPendiente').textContent = my.filter(l => l.estado === 'Pendiente').length;
  document.getElementById('myNegociacion').textContent = my.filter(l => l.estado === 'Negociación').length;
  const vendidos = my.filter(l => l.estado === 'Vendido').length;
  document.getElementById('myVendido').textContent = vendidos;
  document.getElementById('myDescartado').textContent = my.filter(l => l.estado === 'Descartado').length;
  const conv = my.length > 0 ? Math.round((vendidos / my.length) * 100) : 0;
  document.getElementById('myConversion').textContent = conv + '%';
  document.getElementById('myConversionBar').style.width = conv + '%';
}

window.filterMyLeads = function() {
  if (!currentVendedor) return;
  updateMyStats();

  const search = document.getElementById('mySearch').value.toLowerCase();
  const estado = document.getElementById('myFilterEstado').value;

  let filtered = getMyLeads().filter(l => {
    const matchSearch = !search || l.nombre?.toLowerCase().includes(search);
    const matchEstado = !estado || l.estado === estado;
    return matchSearch && matchEstado;
  });

  renderMyTable(filtered);
};

function getStatusClass(estado) {
  const map = { 'Pendiente': 'pendiente', 'No contesta': 'no-contesta', 'Negociación': 'negociacion', 'Vendido': 'vendido', 'Descartado': 'descartado' };
  return map[estado] || 'pendiente';
}

function renderMyTable(leads) {
  const tbody = document.getElementById('myTableBody');
  const empty = document.getElementById('myEmpty');

  if (leads.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = leads.map(lead => `
    <tr>
      <td><span class="lead-name">${escHtml(lead.nombre || '—')}</span></td>
      <td>
        <span class="status-badge status-${getStatusClass(lead.estado)}">
          <select class="status-select" onchange="changeStatus('${lead.id}', this.value)">
            ${['Pendiente','No contesta','Negociación','Vendido','Descartado'].map(s =>
              `<option value="${s}" ${lead.estado === s ? 'selected' : ''}>${s}</option>`
            ).join('')}
          </select>
        </span>
      </td>
      <td class="date-cell">${lead.fechaAsignacion ? formatDate(lead.fechaAsignacion) : '—'}</td>
      <td style="color: var(--audi-silver); font-size:12px;">${escHtml(lead.vendedor || '—')}</td>
    </tr>
  `).join('');
}

function formatDate(d) {
  if (!d) return '—';
  const parts = d.split('-');
  if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
  return d;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.changeStatus = async function(id, newEstado) {
  try {
    await updateDoc(doc(db, "leads", id), { estado: newEstado });
    showToast(`Estado → ${newEstado}`);
  } catch(e) { showToast('Error al actualizar'); }
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
