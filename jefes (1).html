<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audi — Panel de Dirección</title>
<style>
  :root {
    --black: #000;
    --white: #fff;
    --silver: #d0d0d0;
    --gray-dark: #1a1a1a;
    --gray-mid: #2c2c2c;
    --gray-light: #3d3d3d;
    --gray-muted: #888;
    --red: #bb0a14;
    --red-dark: #8a0710;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: Arial, sans-serif; min-height: 100vh; }

  /* ── LOGIN ── */
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--black); padding: 2rem; }
  .login-box { background: var(--gray-dark); border: 1px solid var(--gray-light); padding: 2.5rem; width: 400px; max-width: 100%; }
  .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--gray-light); }
  .rings span { display: inline-block; width: 20px; height: 20px; border: 2.5px solid var(--silver); border-radius: 50%; margin-left: -7px; }
  .rings span:first-child { margin-left: 0; }
  .logo-text { font-size: 13px; letter-spacing: 4px; font-weight: 700; text-transform: uppercase; }
  .login-badge { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; background: var(--red); color: white; padding: 3px 8px; margin-left: 6px; }
  .login-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gray-muted); margin-bottom: 6px; }
  .login-sub { font-size: 20px; font-weight: 700; margin-bottom: 1.75rem; }
  .f-label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray-muted); margin-bottom: 5px; }
  .f-input { width: 100%; background: var(--gray-mid); border: 1px solid var(--gray-light); color: var(--white); padding: 10px 12px; font-size: 13px; outline: none; font-family: Arial, sans-serif; margin-bottom: 1.25rem; }
  .f-input:focus { border-color: var(--red); }
  .btn-red { background: var(--red); color: white; border: none; padding: 11px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; width: 100%; font-family: Arial, sans-serif; transition: background .15s; }
  .btn-red:hover { background: var(--red-dark); }
  .login-err { color: #ef5350; font-size: 12px; margin-top: 8px; display: none; letter-spacing: 1px; }

  /* ── HEADER ── */
  header { background: var(--gray-dark); border-bottom: 1px solid var(--gray-light); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 200; }
  .h-left { display: flex; align-items: center; gap: 12px; }
  .h-title { font-size: 11px; letter-spacing: 2px; color: var(--gray-muted); text-transform: uppercase; }
  .h-sep { color: var(--gray-light); }
  .h-badge { background: var(--red); color: white; font-size: 9px; letter-spacing: 2px; padding: 3px 9px; text-transform: uppercase; }
  .h-right { display: flex; align-items: center; gap: 12px; }
  .live-dot { display: inline-block; width: 7px; height: 7px; background: #4caf50; border-radius: 50%; animation: pulse 2s infinite; margin-right: 5px; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  .live-lbl { font-size: 10px; letter-spacing: 2px; color: var(--gray-muted); text-transform: uppercase; }
  .btn-out { background: none; border: 1px solid var(--gray-light); color: var(--gray-muted); padding: 5px 12px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-family: Arial, sans-serif; }
  .btn-out:hover { color: var(--white); border-color: var(--silver); }

  /* ── STATS ── */
  .stats-bar { background: var(--gray-dark); border-bottom: 1px solid var(--gray-light); padding: .75rem 1.5rem; display: grid; grid-template-columns: repeat(auto-fit,minmax(100px,1fr)); }
  .stat { text-align: center; padding: .65rem .5rem; border-left: 1px solid var(--gray-light); }
  .stat:first-child { border-left: none; }
  .stat-n { font-size: 24px; font-weight: 700; line-height: 1; }
  .stat-l { font-size: 9px; letter-spacing: 2px; color: var(--gray-muted); text-transform: uppercase; margin-top: 3px; }

  /* ── CONTROLS ── */
  .controls { background: var(--gray-dark); border-bottom: 1px solid var(--gray-light); padding: .75rem 1.5rem; display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }
  .c-input { background: var(--gray-mid); border: 1px solid var(--gray-light); color: var(--white); padding: 7px 10px; font-size: 12px; outline: none; font-family: Arial, sans-serif; }
  .c-input:focus { border-color: var(--silver); }
  .c-input::placeholder { color: var(--gray-muted); }
  .btn-add { background: var(--red); color: white; border: none; padding: 7px 18px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: Arial, sans-serif; margin-left: auto; white-space: nowrap; }
  .btn-add:hover { background: var(--red-dark); }

  /* ── KANBAN ── */
  .kanban-outer { padding: 1.25rem 1.5rem; overflow-x: auto; min-height: calc(100vh - 230px); }
  .kanban-board { display: flex; gap: 1rem; align-items: flex-start; min-width: max-content; }
  .k-col { width: 230px; flex-shrink: 0; }
  .k-col-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-bottom: 2px solid; margin-bottom: 8px; }
  .k-col-title { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }
  .k-col-count { font-size: 11px; font-weight: 700; padding: 1px 8px; }
  .kc-pend .k-col-head  { border-color:#f5c518; } .kc-pend .k-col-title { color:#f5c518; } .kc-pend .k-col-count { background:#2a2200; color:#f5c518; }
  .kc-noc  .k-col-head  { border-color:#7b7bff; } .kc-noc  .k-col-title { color:#7b7bff; } .kc-noc  .k-col-count { background:#1a1a2e; color:#7b7bff; }
  .kc-neg  .k-col-head  { border-color:#4fc3f7; } .kc-neg  .k-col-title { color:#4fc3f7; } .kc-neg  .k-col-count { background:#001a2e; color:#4fc3f7; }
  .kc-vend .k-col-head  { border-color:#4caf50; } .kc-vend .k-col-title { color:#4caf50; } .kc-vend .k-col-count { background:#002200; color:#4caf50; }
  .kc-desc .k-col-head  { border-color:#ef5350; } .kc-desc .k-col-title { color:#ef5350; } .kc-desc .k-col-count { background:#1e0a0a; color:#ef5350; }
  .k-col-body { min-height: 100px; padding: 2px 0; transition: background .15s; }
  .k-col-body.over { background: rgba(187,10,20,.07); border-radius: 4px; }

  /* ── CARD ── */
  .card { background: var(--gray-dark); border: 1px solid var(--gray-light); padding: 11px 12px; margin-bottom: 8px; cursor: grab; transition: border-color .15s, box-shadow .15s; user-select: none; }
  .card:hover { border-color: var(--silver); box-shadow: 0 2px 12px rgba(0,0,0,.5); }
  .card.dragging { opacity: .35; cursor: grabbing; }
  .card.stale { border-left: 3px solid #f5c518; }
  .card-name { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
  .card-vend { font-size: 11px; color: var(--silver); margin-bottom: 3px; }
  .card-fecha { font-size: 11px; color: var(--gray-muted); }
  .card-days { font-size: 10px; color: var(--gray-muted); margin-top: 3px; }
  .stale-badge { display: inline-block; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: #f5c518; background: #2a2200; padding: 2px 6px; margin-top: 6px; }
  .card-btns { display: flex; gap: 5px; margin-top: 9px; padding-top: 8px; border-top: 1px solid #252525; }
  .card-btn { flex: 1; background: none; border: 1px solid var(--gray-light); color: var(--gray-muted); padding: 4px 0; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-family: Arial, sans-serif; transition: all .15s; }
  .card-btn:hover { color: var(--white); border-color: var(--silver); }
  .card-btn.del:hover { color: #ef5350; border-color: #ef5350; }
  .k-empty { text-align: center; padding: 2rem .5rem; color: var(--gray-muted); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; border: 1px dashed var(--gray-light); }

  /* ── MODAL ── */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 500; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--gray-dark); border: 1px solid var(--gray-light); padding: 2rem; width: 460px; max-width: 95vw; max-height: 92vh; overflow-y: auto; }
  .modal-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--gray-light); }
  .modal-tit { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--silver); }
  .modal-x { background: none; border: none; color: var(--gray-muted); font-size: 22px; cursor: pointer; line-height: 1; }
  .modal-x:hover { color: var(--white); }
  .fg { margin-bottom: 1rem; }
  .fg label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray-muted); margin-bottom: 5px; }
  .fg input, .fg select { width: 100%; background: var(--gray-mid); border: 1px solid var(--gray-light); color: var(--white); padding: 9px 11px; font-size: 13px; outline: none; font-family: Arial, sans-serif; }
  .fg input:focus, .fg select:focus { border-color: var(--red); }
  .fg select option { background: var(--gray-mid); }
  .form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .modal-ft { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--gray-light); }
  .btn-sec { background: transparent; border: 1px solid var(--gray-light); color: var(--silver); padding: 8px 18px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: Arial, sans-serif; }
  .btn-sec:hover { border-color: var(--silver); background: var(--gray-light); }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--gray-mid); border-left: 3px solid var(--red); color: var(--white); padding: 11px 18px; font-size: 12px; letter-spacing: 1px; z-index: 9999; opacity: 0; transform: translateY(8px); transition: all .3s; pointer-events: none; max-width: 280px; }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width:640px) {
    .kanban-board { gap: .6rem; }
    .k-col { width: 185px; }
    .stats-bar { grid-template-columns: repeat(4,1fr); }
    .controls { gap: .4rem; }
  }
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginWrap" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="rings"><span></span><span></span><span></span><span></span></div>
      <span class="logo-text" style="margin-left:8px">Audi</span>
      <span class="login-badge">Dirección</span>
    </div>
    <div class="login-title">Acceso restringido</div>
    <div class="login-sub">Panel de Dirección</div>
    <label class="f-label">Contraseña</label>
    <input type="password" class="f-input" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-red" onclick="doLogin()">Acceder al panel</button>
    <div class="login-err" id="loginErr">Contraseña incorrecta. Contacta con soporte.</div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="appWrap" style="display:none">

  <header>
    <div class="h-left">
      <div class="rings"><span></span><span></span><span></span><span></span></div>
      <span class="logo-text" style="margin-left:8px">Audi</span>
      <span class="h-sep">|</span>
      <span class="h-title">Panel de Dirección</span>
    </div>
    <div class="h-right">
      <span><span class="live-dot"></span><span class="live-lbl">En vivo</span></span>
      <span class="h-badge">Dirección</span>
      <button class="btn-out" onclick="doLogout()">Salir</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n" style="color:#f5c518" id="sPend">0</div><div class="stat-l">Pendiente</div></div>
    <div class="stat"><div class="stat-n" style="color:#7b7bff" id="sNoC">0</div><div class="stat-l">No contesta</div></div>
    <div class="stat"><div class="stat-n" style="color:#4fc3f7" id="sNeg">0</div><div class="stat-l">Negociación</div></div>
    <div class="stat"><div class="stat-n" style="color:#4caf50" id="sVend">0</div><div class="stat-l">Vendidos</div></div>
    <div class="stat"><div class="stat-n" style="color:#ef5350" id="sDesc">0</div><div class="stat-l">Descartados</div></div>
    <div class="stat"><div class="stat-n" style="color:#4caf50" id="sConv">0%</div><div class="stat-l">Conversión</div></div>
  </div>

  <div class="controls">
    <input type="text" class="c-input" id="fSearch" placeholder="Buscar lead o vendedor…" oninput="render()" style="min-width:170px">
    <select class="c-input" id="fVend" onchange="render()">
      <option value="">Todos los vendedores</option>
    </select>
    <input type="date" class="c-input" id="fDesde" onchange="render()" title="Desde">
    <input type="date" class="c-input" id="fHasta" onchange="render()" title="Hasta">
    <button class="btn-add" onclick="openModal()">+ Nuevo lead</button>
  </div>

  <div class="kanban-outer">
    <div class="kanban-board" id="board"></div>
  </div>
</div>

<!-- ══ MODAL ══ -->
<div class="modal-bg" id="modalBg" onclick="bgClick(event)">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-tit" id="modalTit">Nuevo lead</span>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="form-row2">
      <div class="fg"><label>Nombre</label><input type="text" id="iNom" placeholder="Nombre"></div>
      <div class="fg"><label>Apellidos</label><input type="text" id="iApe" placeholder="Apellidos"></div>
    </div>
    <div class="fg"><label>Estado inicial</label>
      <select id="iEst">
        <option>Pendiente</option><option>No contesta</option><option>Negociación</option><option>Vendido</option><option>Descartado</option>
      </select>
    </div>
    <div class="fg"><label>Fecha de asignación</label><input type="date" id="iFec"></div>
    <div class="form-row2">
      <div class="fg"><label>Nombre vendedor</label><input type="text" id="iVN" placeholder="Nombre"></div>
      <div class="fg"><label>Apellido vendedor</label><input type="text" id="iVA" placeholder="Apellidos"></div>
    </div>
    <div class="modal-ft">
      <button class="btn-sec" onclick="closeModal()">Cancelar</button>
      <button class="btn-red" style="width:auto;padding:8px 22px;letter-spacing:2px" onclick="saveLead()">Guardar lead</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDnPbDkfQE2NfifFqRb7TJXvcY6zCNy1Hk",
  authDomain: "gestionleadsaudi.firebaseapp.com",
  projectId: "gestionleadsaudi",
  storageBucket: "gestionleadsaudi.firebasestorage.app",
  messagingSenderId: "805968706133",
  appId: "1:805968706133:web:88ea847b5dd9119ce7b2dc",
  measurementId: "G-HVJTQNNP0F"
};

// ── CONTRASEÑA DE ACCESO ──
const PASS = "audi2025dir";

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let leads  = [];
let editId = null;
let dragId = null;

// ── LOGIN ──
if (sessionStorage.getItem('audi_dir') === PASS) bootApp();

window.doLogin = () => {
  const v = document.getElementById('pwInput').value;
  if (v === PASS) { sessionStorage.setItem('audi_dir', v); bootApp(); }
  else { document.getElementById('loginErr').style.display = 'block'; }
};
window.doLogout = () => { sessionStorage.removeItem('audi_dir'); location.reload(); };

function bootApp() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('appWrap').style.display   = 'block';
  const q = query(collection(db,'leads'), orderBy('fechaAsignacion','desc'));
  onSnapshot(q, snap => {
    leads = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    refreshVendFilter();
    render();
  });
}

function refreshVendFilter() {
  const sel = document.getElementById('fVend'), cur = sel.value;
  const vs  = [...new Set(leads.map(l => l.vendedor).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Todos los vendedores</option>';
  vs.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; if(v===cur) o.selected=true; sel.appendChild(o); });
}

// ── RENDER ──
window.render = () => {
  const s   = document.getElementById('fSearch').value.toLowerCase();
  const v   = document.getElementById('fVend').value;
  const d0  = document.getElementById('fDesde').value;
  const d1  = document.getElementById('fHasta').value;

  const fl = leads.filter(l =>
    (!s  || l.nombre?.toLowerCase().includes(s) || l.vendedor?.toLowerCase().includes(s)) &&
    (!v  || l.vendedor === v) &&
    (!d0 || l.fechaAsignacion >= d0) &&
    (!d1 || l.fechaAsignacion <= d1)
  );

  updateStats(fl);

  const cols = [
    { key:'Pendiente',   cls:'kc-pend', lbl:'Pendiente'   },
    { key:'No contesta', cls:'kc-noc',  lbl:'No contesta' },
    { key:'Negociación', cls:'kc-neg',  lbl:'Negociación' },
    { key:'Vendido',     cls:'kc-vend', lbl:'Vendido'     },
    { key:'Descartado',  cls:'kc-desc', lbl:'Descartado'  },
  ];

  document.getElementById('board').innerHTML = cols.map(c => {
    const items = fl.filter(l => l.estado === c.key);
    const safeKey = c.key.replace(/ /g,'_');
    return `
      <div class="k-col ${c.cls}">
        <div class="k-col-head">
          <span class="k-col-title">${c.lbl}</span>
          <span class="k-col-count">${items.length}</span>
        </div>
        <div class="k-col-body" id="col_${safeKey}"
          ondragover="ev.preventDefault()"
          ondrop="drop(event,'${c.key}')"
          ondragenter="this.classList.add('over')"
          ondragleave="this.classList.remove('over')">
          ${items.length ? items.map(l => cardHtml(l)).join('') : '<div class="k-empty">Sin leads</div>'}
        </div>
      </div>`;
  }).join('');
};

function daysSince(f) {
  if(!f) return 0;
  return Math.floor((Date.now() - new Date(f).getTime()) / 86400000);
}
function fmtDate(d) {
  if(!d) return '—';
  const p = d.split('-');
  return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : d;
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function cardHtml(l) {
  const days  = daysSince(l.fechaAsignacion);
  const stale = days >= 7;
  const safe  = JSON.stringify(l).replace(/'/g,"\\'");
  return `<div class="card${stale?' stale':''}" draggable="true"
    ondragstart="dragStart(event,'${l.id}')" ondragend="dragEnd(event)">
    <div class="card-name">${esc(l.nombre||'—')}</div>
    <div class="card-vend">${esc(l.vendedor||'—')}</div>
    <div class="card-fecha">${fmtDate(l.fechaAsignacion)}</div>
    <div class="card-days">${days} día${days!==1?'s':''} desde asignación</div>
    ${stale?'<div class="stale-badge">⚠ +7 días sin actualizar</div>':''}
    <div class="card-btns">
      <button class="card-btn" onclick='editLead(${JSON.stringify(l)})'>Editar</button>
      <button class="card-btn del" onclick="delLead('${l.id}')">Eliminar</button>
    </div>
  </div>`;
}

function updateStats(fl) {
  document.getElementById('sTotal').textContent = fl.length;
  document.getElementById('sPend').textContent  = fl.filter(l=>l.estado==='Pendiente').length;
  document.getElementById('sNoC').textContent   = fl.filter(l=>l.estado==='No contesta').length;
  document.getElementById('sNeg').textContent   = fl.filter(l=>l.estado==='Negociación').length;
  const v = fl.filter(l=>l.estado==='Vendido').length;
  document.getElementById('sVend').textContent  = v;
  document.getElementById('sDesc').textContent  = fl.filter(l=>l.estado==='Descartado').length;
  document.getElementById('sConv').textContent  = fl.length ? Math.round(v/fl.length*100)+'%' : '0%';
}

// ── DRAG & DROP ──
window.dragStart = (e,id) => { dragId=id; e.currentTarget.classList.add('dragging'); };
window.dragEnd   = (e)    => { e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.k-col-body').forEach(c=>c.classList.remove('over')); };
window.drop = async (e,estado) => {
  e.preventDefault(); e.currentTarget.classList.remove('over');
  if(!dragId) return;
  try { await updateDoc(doc(db,'leads',dragId),{estado, updatedAt:serverTimestamp()}); toast('Movido → '+estado); }
  catch(err){ toast('Error al mover'); }
  dragId=null;
};

// ── MODAL ──
window.openModal = () => {
  editId=null;
  document.getElementById('modalTit').textContent='Nuevo lead';
  ['iNom','iApe','iVN','iVA'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('iEst').value='Pendiente';
  document.getElementById('iFec').value=new Date().toISOString().split('T')[0];
  document.getElementById('modalBg').classList.add('open');
};
window.editLead = l => {
  editId=l.id;
  document.getElementById('modalTit').textContent='Editar lead';
  const np=(l.nombre||'').split(' ');
  document.getElementById('iNom').value=np[0]||'';
  document.getElementById('iApe').value=np.slice(1).join(' ')||'';
  document.getElementById('iEst').value=l.estado||'Pendiente';
  document.getElementById('iFec').value=l.fechaAsignacion||'';
  const vp=(l.vendedor||'').split(' ');
  document.getElementById('iVN').value=vp[0]||'';
  document.getElementById('iVA').value=vp.slice(1).join(' ')||'';
  document.getElementById('modalBg').classList.add('open');
};
window.closeModal = () => document.getElementById('modalBg').classList.remove('open');
window.bgClick    = e => { if(e.target===document.getElementById('modalBg')) closeModal(); };

window.saveLead = async () => {
  const n=document.getElementById('iNom').value.trim();
  const a=document.getElementById('iApe').value.trim();
  const vn=document.getElementById('iVN').value.trim();
  const va=document.getElementById('iVA').value.trim();
  if(!n||!vn){ toast('Nombre del lead y vendedor son obligatorios'); return; }
  const data = {
    nombre: a?`${n} ${a}`:n,
    estado: document.getElementById('iEst').value,
    fechaAsignacion: document.getElementById('iFec').value,
    vendedor: va?`${vn} ${va}`:vn,
    updatedAt: serverTimestamp()
  };
  try {
    if(editId){ await updateDoc(doc(db,'leads',editId),data); toast('Lead actualizado'); }
    else { data.createdAt=serverTimestamp(); await addDoc(collection(db,'leads'),data); toast('Lead añadido'); }
    closeModal();
  } catch(e){ toast('Error: '+e.message); }
};

window.delLead = async id => {
  if(!confirm('¿Eliminar este lead?')) return;
  try { await deleteDoc(doc(db,'leads',id)); toast('Lead eliminado'); }
  catch(e){ toast('Error al eliminar'); }
};

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
</body>
</html>
